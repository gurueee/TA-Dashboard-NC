function Modal({ title, onClose, children, wide }) {

    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>

        <div style={{ padding:20 }}>{children}</div>
      </div>
    </div>

}

// ─── MANAGE LIST MODAL ────────────────────────────────────────────────────────
function ManageListModal({ title, items, onSave, onClose }) {
  const [list, setList] = useState([...items]);
  const [newItem, setNewItem] = useState('');
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState('');

  const addItem = () => {
    const t = newItem.trim();
    if(t && !list.includes(t)) { setList(l => [...l, t]); setNewItem(''); }
  };

  return (
    <Modal title={`Manage ${title}`} onClose={onClose}>
      <div style={{ marginBottom:16, display:'flex', gap:8 }}>
        <input style={{ ...S.input, flex:1 }} value={newItem}
          onChange={e => setNewItem(e.target.value)}
          placeholder={`Type new ${title.toLowerCase()} name…`}
          onKeyDown={e => { if(e.key==='Enter') addItem(); }} />
        <button style={{ background:'#14b8a6', color:'#0f172a', border:'none', borderRadius:7, padding:'9px 20px', fontSize:13, fontWeight:800, cursor:'pointer', whiteSpace:'nowrap' }} onClick={addItem}>＋ Add</button>
      </div>
      <div style={{ maxHeight:300, overflow:'auto' }}>
        {list.map((item, i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 0', borderBottom:'1px solid #1e293b' }}>
            {editIdx === i ? (
              <>
                <input style={{ ...S.input, flex:1 }} value={editVal} onChange={e => setEditVal(e.target.value)}
                  onKeyDown={e => { if(e.key==='Enter'){ const nl=[...list]; nl[i]=editVal.trim(); setList(nl); setEditIdx(null);}}} />
                <button style={S.btn()} onClick={() => { const nl=[...list]; nl[i]=editVal.trim(); setList(nl); setEditIdx(null);}}>Save</button>
                <button style={S.btn('ghost')} onClick={() => setEditIdx(null)}>Cancel</button>
              </>
            ) : (
              <>
                <span style={{ flex:1, color:'#e2e8f0', fontSize:13 }}>{item}</span>
                <button style={S.btn('secondary')} onClick={() => { setEditIdx(i); setEditVal(item); }}>Edit</button>
                <button style={S.btn('danger')} onClick={() => setList(list.filter((_,j)=>j!==i))}>Delete</button>
              </>
            )}
          </div>
        ))}
      </div>
      <div style={{ marginTop:16, display:'flex', justifyContent:'flex-end', gap:8 }}>
        <button style={S.btn('secondary')} onClick={onClose}>Cancel</button>
        <button style={{ background:'#14b8a6', color:'#0f172a', border:'none', borderRadius:7, padding:'10px 24px', fontSize:14, fontWeight:800, cursor:'pointer', boxShadow:'0 0 14px rgba(20,184,166,0.4)' }} onClick={() => { onSave(list); onClose(); }}>✔ Save Changes</button>
      </div>
    </Modal>
  );
}

function RecordForm({ record, taPartners, workAreas, onSave, onCancel, hideCancel, onUpdateLists, fixedPartner }) {
  const [form, setForm] = useState(() => {
    const base = record ? { ...record } : { ...newRecord(), createdAt: TODAY };
    if(fixedPartner) base.taPartner = fixedPartner;
    return base;
  });
  const [managingPartners, setManagingPartners] = useState(false);
  const [managingAreas, setManagingAreas] = useState(false);
  const [localPartners, setLocalPartners] = useState([...taPartners]);
  const [localAreas, setLocalAreas] = useState([...workAreas]);

  // Keep local lists in sync if parent updates (e.g. on re-open)
  useEffect(() => { setLocalPartners([...taPartners]); }, [taPartners]);
  useEffect(() => { setLocalAreas([...workAreas]); }, [workAreas]);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const setWC = (idx, k, v) => setForm(f => { const wc=[...f.weeklyCommits]; wc[idx]={...wc[idx],[k]:v}; return {...f,weeklyCommits:wc}; });
  const addWeek = () => setForm(f => ({ ...f, weeklyCommits: [...f.weeklyCommits, { week:'', commit:'', progressMet:null }] }));
  const removeWeek = (idx) => setForm(f => ({ ...f, weeklyCommits: f.weeklyCommits.filter((_,i)=>i!==idx) }));

  const handleSavePartners = (list) => {
    setLocalPartners(list);
    if(onUpdateLists) onUpdateLists({ taPartners: list });
  };
  const handleSaveAreas = (list) => {
    setLocalAreas(list);
    if(onUpdateLists) onUpdateLists({ workAreas: list });
  };

  const yetToHire = calcYTH(form);
  const autoWIP       = calcWIP(form.offersWIPName);
  const autoOfferAcc  = calcWIP(form.offerAcceptedName);
  const autoHired     = calcWIP(form.hiredName);
  const autoDeclined  = calcWIP(form.declinedName);

  const handleSubmit = () => {

      ...form,

      totalOffersAccepted: autoOfferAcc,

              ) : (
                <>
                  <select style={{ ...S.input, flex:1 }} value={form.taPartner} onChange={e => set('taPartner', e.target.value)}>
                    <option value="">— Select TA Partner —</option>
                    {localPartners.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <button style={{ ...S.btn('secondary'), padding:'8px 10px', fontSize:16 }} onClick={() => setManagingPartners(true)} title="Add / Edit / Delete TA Partners">⚙</button>

          <div style={S.formRow}>
            <label style={S.label}>Work Area *</label>

              <select style={{ ...S.input, flex:1 }} value={form.workArea} onChange={e => set('workArea', e.target.value)}>

                {localAreas.map(a => <option key={a} value={a}>{a}</option>)}

// ─── MONTH-WISE JOINERS TABLE ─────────────────────────────────────────────────
function MonthwiseJoiners({ records, type, title, color }) {
  const rows = useMemo(() => {
    const out = [];
    records.forEach(r => {
      const name = type==='offered' ? r.offerAcceptedName : type==='hired' ? r.hiredName : r.declinedName;
      const doj  = type==='offered' ? r.offerAcceptedDOJ  : type==='hired' ? r.hiredDOJ  : r.declinedDOJ;
      if(!name || !doj) return;
      name.split(',').map(n=>n.trim()).filter(Boolean).forEach(n => {
        out.push({ partner: r.taPartner, candidate: n, workArea: r.workArea, doj, month: doj.substring(0,7) });
      });
    });
    return out.sort((a,b) => a.doj.localeCompare(b.doj));
  }, [records, type]);

  const byMonth = useMemo(() => {
    const map = {};
    rows.forEach(r => { if(!map[r.month]) map[r.month]=[]; map[r.month].push(r); });
    return map;
  }, [rows]);

  const months = Object.keys(byMonth).sort();

  if(rows.length === 0) return (
    <div style={{ color:'#475569', fontSize:13, padding:'16px 0' }}>No {title.toLowerCase()} data available.</div>
  );

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
        <div style={{ width:4, height:20, borderRadius:2, background:color }} />
        <span style={{ fontSize:13, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.08em' }}>{title} — {rows.length} total</span>
      </div>
      {months.map(m => (
        <div key={m} style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:color, background:`${color}15`, padding:'4px 10px', borderRadius:4, marginBottom:6, display:'inline-block' }}>
            {new Date(m+'-01').toLocaleString('default',{month:'long',year:'numeric'})} — {byMonth[m].length} joiner{byMonth[m].length>1?'s':''}
          </div>
          <table style={{ ...S.table, fontSize:11 }}>
            <thead><tr>{['TA Partner','Candidate Name','Work Area','DOJ'].map(h=><th key={h} style={{ ...S.th, fontSize:10 }}>{h}</th>)}</tr></thead>
            <tbody>
              {byMonth[m].map((row,i) => (
                <tr key={i}>
                  <td style={{ ...S.td, fontWeight:600, color:'#e2e8f0' }}>{row.partner}</td>
                  <td style={{ ...S.td, color:color, fontWeight:600 }}>{row.candidate}</td>
                  <td style={{ ...S.td, color:'#94a3b8' }}>{row.workArea}</td>
                  <td style={{ ...S.td, color:'#64748b', whiteSpace:'nowrap' }}>{row.doj}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))}
    </div>
  );
}

// ─── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function loadSheetJS(cb) {
  if(window.XLSX) { cb(window.XLSX); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = () => cb(window.XLSX);
  document.head.appendChild(s);
}

function downloadExcel(records) {
  loadSheetJS(XLSX => {
    const masterRows = records.map(r => ({
      'TA Partner':           r.taPartner,
      'Work Area':            r.workArea,
      'Target Closures':      r.targetClosure,
      'Total Hired':          r.totalHired,
      'Yet To Hire':          calcYTH(r),
      'Offers Accepted':      r.totalOffersAccepted,
      'Offer Declined':       r.totalDeclined,
      'Offers WIP':           r.totalOffersWIP,
      'Advance Stage':        r.advanceStage,
      'Offer Accepted Name':  r.offerAcceptedName,
      'Offer Accepted DOJ':   r.offerAcceptedDOJ,
      'Hired Name':           r.hiredName,
      'Hired DOJ':            r.hiredDOJ,
      'Declined Name':        r.declinedName,
      'Declined DOJ':         r.declinedDOJ,
      'WIP Name':             r.offersWIPName,
      'Date Added':           r.createdAt || '',
    }));

    const partnerMap = {};
    records.forEach(r => {
      if(!r.taPartner) return;
      if(!partnerMap[r.taPartner]) partnerMap[r.taPartner] = { 'TA Partner':r.taPartner, 'Target Closures':0, 'Total Hired':0, 'Yet To Hire':0, 'Offer Declined':0, 'Offers WIP':0, 'Offers Accepted':0 };
      partnerMap[r.taPartner]['Target Closures'] += r.targetClosure||0;
      partnerMap[r.taPartner]['Total Hired']     += r.totalHired||0;
      partnerMap[r.taPartner]['Yet To Hire']     += calcYTH(r);
      partnerMap[r.taPartner]['Offer Declined']  += r.totalDeclined||0;
      partnerMap[r.taPartner]['Offers WIP']      += r.totalOffersWIP||0;
      partnerMap[r.taPartner]['Offers Accepted'] += r.totalOffersAccepted||0;
    });

    const areaMap = {};
    records.forEach(r => {
      if(!r.workArea) return;
      if(!areaMap[r.workArea]) areaMap[r.workArea] = { 'Work Area':r.workArea, 'Target Closures':0, 'Total Hired':0, 'Yet To Hire':0, 'Offers Accepted':0, 'Offers WIP':0, 'Total Declined':0 };
      areaMap[r.workArea]['Target Closures'] += r.targetClosure||0;
      areaMap[r.workArea]['Total Hired']     += r.totalHired||0;
      areaMap[r.workArea]['Yet To Hire']     += calcYTH(r);
      areaMap[r.workArea]['Offers Accepted'] += r.totalOffersAccepted||0;
      areaMap[r.workArea]['Offers WIP']      += r.totalOffersWIP||0;
      areaMap[r.workArea]['Total Declined']  += r.totalDeclined||0;
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(masterRows),              'MASTER');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(Object.values(partnerMap)), 'TA PARTNER SCORECARD');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(Object.values(areaMap)),    'OPEN REQ VIEW');

    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `Team_John_Work_Targets_${date}.xlsx`);
  });
}

    targetClosure: records.reduce((s,r) => s + (r.targetClosure||0), 0),
    totalHired: records.reduce((s,r) => s + (r.totalHired||0), 0),
    yetToHire: records.reduce((s,r) => s + calcYTH(r), 0),
    offersAccepted: records.reduce((s,r) => s + (r.totalOffersAccepted||0), 0),
    declined: records.reduce((s,r) => s + (r.totalDeclined||0), 0),
    offersWIP: records.reduce((s,r) => s + (r.totalOffersWIP||0), 0),
    advanceStage: records.filter(r => r.advanceStage).length,
    hireRate: records.reduce((s,r) => s + (r.totalHired||0), 0) / Math.max(1, records.reduce((s,r) => s + (r.targetClosure||0), 0)),
  }), [records]);

  const byPartner = useMemo(() => {
    const map = {};
    records.forEach(r => {
      if(!r.taPartner) return;
      if(!map[r.taPartner]) map[r.taPartner] = { name:r.taPartner, target:0, hired:0, yetToHire:0, declined:0, offersAccepted:0, wip:0 };
      map[r.taPartner].target += r.targetClosure||0;
      map[r.taPartner].hired += r.totalHired||0;
      map[r.taPartner].yetToHire += calcYTH(r);
      map[r.taPartner].declined += r.totalDeclined||0;
      map[r.taPartner].offersAccepted += r.totalOffersAccepted||0;
      map[r.taPartner].wip += r.totalOffersWIP||0;
    });
    return Object.values(map).sort((a,b) => b.target - a.target);
  }, [records]);

  const byArea = useMemo(() => {
    const map = {};
    records.forEach(r => {
      if(!r.workArea) return;
      if(!map[r.workArea]) map[r.workArea] = { name:r.workArea, target:0, hired:0, yetToHire:0 };
      map[r.workArea].target += r.targetClosure||0;
      map[r.workArea].hired += r.totalHired||0;
      map[r.workArea].yetToHire += calcYTH(r);
    });
    return Object.values(map).sort((a,b) => b.target - a.target).slice(0,10);
  }, [records]);

  const progressData = useMemo(() => {
    let yes=0, no=0, na=0;
    records.forEach(r => r.weeklyCommits?.forEach(wc => { if(wc.progressMet===true) yes++; else if(wc.progressMet===false) no++; else na++; }));
    return [{ name:'Met', value:yes, color:'#22c55e' }, { name:'Not Met', value:no, color:'#ef4444' }, { name:'N/A', value:na, color:'#334155' }];
  }, [records]);

  const kpis = [
    { label:'Total Target Closures', value:totals.targetClosure, color:'#6366f1', sub:`${(totals.hireRate*100).toFixed(0)}% hire rate`, drillKey:'target' },
    { label:'Total Hired',           value:totals.totalHired,    color:'#22c55e', sub:'Joined / Onboarded',    drillKey:'hired' },
    { label:'Yet To Hire',           value:totals.yetToHire,     color:'#f59e0b', sub:'Open positions',        drillKey:'yetToHire' },
    { label:'Offers Accepted',       value:totals.offersAccepted,color:'#14b8a6', sub:'Pending joining',       drillKey:'offered' },
    { label:'Offers Declined',       value:totals.declined,      color:'#ef4444', sub:'Declines / Fallouts',   drillKey:'declined' },
    { label:'Offers WIP',            value:totals.offersWIP,     color:'#8b5cf6', sub:'In pipeline',           drillKey:'wip' },
  ];

  return (
    <div>
      {drilldown && <KpiDrilldown type={drilldown} records={records} onClose={() => setDrilldown(null)} />}
      <div style={{ padding:'20px 24px 0', borderBottom:'1px solid #1e293b', paddingBottom:0 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <img src={LOGO_SRC} alt="NC" style={{ width:36, filter:'brightness(0.85)' }} />
            <div>
              <div style={{ fontSize:20, fontWeight:700, color:'#f1f5f9' }}>Recruitment Dashboard</div>
              <div style={{ fontSize:13, color:'#64748b', marginTop:2 }}>Netcracker — Weekly Summary • {records.length} active records</div>
            </div>
          </div>
          <button onClick={() => downloadExcel(records)}
            style={{ display:'flex', alignItems:'center', gap:8, background:'#16a34a', color:'#fff', border:'none', borderRadius:8, padding:'9px 18px', fontSize:13, fontWeight:700, cursor:'pointer', boxShadow:'0 0 12px rgba(22,163,74,0.3)' }}>
            ⬇ Download Excel
          </button>
        </div>
        <div style={{ display:'flex', gap:0 }}>
          {[{id:'overview',label:'📊 Overview'},{id:'offered',label:'✅ Offer Accepted'},{id:'hired',label:'🎯 Hired'},{id:'declined',label:'❌ Declined'}].map(t => (
            <div key={t.id} onClick={() => setDashTab(t.id)}
              style={{ padding:'8px 16px', cursor:'pointer', fontSize:12, fontWeight: dashTab===t.id ? 700 : 400,
                color: dashTab===t.id ? '#14b8a6' : '#64748b',
                borderBottom: dashTab===t.id ? '2px solid #14b8a6' : '2px solid transparent', transition:'all 0.15s' }}>
              {t.label}
            </div>
          ))}
        </div>
      </div>
      <div style={{ padding:24 }}>
        {dashTab==='offered' && <div style={{padding:24}}><MonthwiseJoiners records={records} type="offered" title="Offer Accepted Joiners" color="#22c55e" /></div>}
        {dashTab==='hired'   && <div style={{padding:24}}><MonthwiseJoiners records={records} type="hired"   title="Hired Joiners" color="#14b8a6" /></div>}
        {dashTab==='declined'&& <div style={{padding:24}}><MonthwiseJoiners records={records} type="declined" title="Offer Declined" color="#ef4444" /></div>}
        {dashTab==='overview' && <>
        {/* KPIs */}
        <div style={S.grid(6)}>
          {kpis.map(k => (
            <div key={k.label}
              onClick={() => setDrilldown(k.drillKey)}
              style={{ ...S.kpiCard(k.color), cursor:'pointer', transition:'all 0.15s', position:'relative', overflow:'hidden' }}
              onMouseEnter={e => { e.currentTarget.style.background='#1e293b'; e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow=`0 8px 24px ${k.color}25`; }}
              onMouseLeave={e => { e.currentTarget.style.background='#0f172a'; e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}
            >
              <div style={S.kpiLabel}>{k.label}</div>
              <div style={{ ...S.kpiVal, color:k.color }}>{k.value}</div>
              <div style={S.kpiSub}>{k.sub}</div>
              <div style={{ position:'absolute', top:8, right:8, fontSize:10, color:`${k.color}80`, fontWeight:700, letterSpacing:'0.05em' }}>VIEW ↗</div>
            </div>
          ))}
        </div>

        {/* Charts Row 1 */}
        <div style={{ ...S.grid(2), marginTop:20 }}>
          <div style={S.card}>
            <div style={S.sectionTitle}>TA Partner Performance</div>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={byPartner} margin={{ top:0, right:10, left:-20, bottom:40 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                <XAxis dataKey="name" tick={{ fill:'#64748b', fontSize:10 }} angle={-35} textAnchor="end" interval={0} />
                <YAxis tick={{ fill:'#64748b', fontSize:10 }} />
                <Tooltip contentStyle={{ background:'#0f172a', border:'1px solid #1e293b', borderRadius:6, fontSize:12 }} />
                <Legend wrapperStyle={{ fontSize:11, color:'#64748b' }} />
                <Bar dataKey="target" name="Target" fill="#6366f1" radius={[3,3,0,0]} />
                <Bar dataKey="hired" name="Hired" fill="#22c55e" radius={[3,3,0,0]} />
                <Bar dataKey="yetToHire" name="Yet To Hire" fill="#f59e0b" radius={[3,3,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={S.card}>
            <div style={S.sectionTitle}>Progress Consistency</div>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:32 }}>
              <ResponsiveContainer width={180} height={180}>
                <PieChart>
                  <Pie data={progressData.filter(d=>d.value>0)} cx="50%" cy="50%" innerRadius={50} outerRadius={80} dataKey="value" paddingAngle={3}>
                    {progressData.filter(d=>d.value>0).map((d,i) => <Cell key={i} fill={d.color} />)}
                  </Pie>
                  <Tooltip contentStyle={{ background:'#0f172a', border:'1px solid #1e293b', fontSize:12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div>
                {progressData.map(d => (
                  <div key={d.name} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <div style={{ width:10, height:10, borderRadius:2, background:d.color }} />
                    <span style={{ fontSize:12, color:'#94a3b8' }}>{d.name}</span>
                    <span style={{ fontSize:14, fontWeight:700, color:d.color, marginLeft:4 }}>{d.value}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Charts Row 2 */}
        <div style={{ ...S.grid(1), marginTop:20 }}>
          <div style={S.card}>
            <div style={S.sectionTitle}>Top 10 Work Areas by Target</div>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={byArea} margin={{ top:0, right:10, left:-20, bottom:40 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                <XAxis dataKey="name" tick={{ fill:'#64748b', fontSize:10 }} angle={-30} textAnchor="end" interval={0} />
                <YAxis tick={{ fill:'#64748b', fontSize:10 }} />
                <Tooltip contentStyle={{ background:'#0f172a', border:'1px solid #1e293b', borderRadius:6, fontSize:12 }} />
                <Legend wrapperStyle={{ fontSize:11, color:'#64748b' }} />
                <Bar dataKey="target" name="Target" fill="#6366f1" radius={[3,3,0,0]} />
                <Bar dataKey="hired" name="Hired" fill="#22c55e" radius={[3,3,0,0]} />
                <Bar dataKey="yetToHire" name="Yet To Hire" fill="#f59e0b" radius={[3,3,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Quick Table */}
        <div style={{ ...S.card, marginTop:20 }}>
          <div style={S.sectionTitle}>TA Partner Scorecard Summary</div>
          <div style={{ overflowX:'auto' }}>
            <table style={S.table}>
              <thead>
                <tr>
                  {['TA Partner','Target Closures','Hired','Yet To Hire','Offers Accepted','Declined','WIP','Hire Rate'].map(h => (
                    <th key={h} style={S.th}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {byPartner.map(p => (
                  <tr key={p.name} style={{ background:'#0a0f1e30' }}>
                    <td style={{ ...S.td, fontWeight:600, color:'#e2e8f0' }}>{p.name}</td>
                    <td style={S.td}>{p.target}</td>
                    <td style={{ ...S.td, color:'#22c55e', fontWeight:600 }}>{p.hired}</td>
                    <td style={{ ...S.td, color:'#f59e0b' }}>{p.yetToHire}</td>
                    <td style={{ ...S.td, color:'#14b8a6' }}>{p.offersAccepted}</td>
                    <td style={{ ...S.td, color:'#ef4444' }}>{p.declined}</td>
                    <td style={{ ...S.td, color:'#8b5cf6' }}>{p.wip}</td>

                      <span style={S.tag(p.target>0 ? (p.hired/p.target > 0.7 ? '#22c55e' : p.hired/p.target > 0.3 ? '#f59e0b' : '#ef4444') : '#475569')}>
                        {p.target > 0 ? `${(p.hired/p.target*100).toFixed(0)}%` : 'N/A'}
                      </span>

                ))}
              </tbody>
            </table>
          </div>
        </div>
        </>}
      </div>
    </div>

// ─── RECORDS TABLE ────────────────────────────────────────────────────────────
function RecordsView({ records, taPartners, workAreas, onEdit, onDelete }) {
  const [filterPartner, setFilterPartner] = useState('');
  const [filterArea, setFilterArea] = useState('');
  const [filterHired, setFilterHired] = useState('');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(0);
  const PER_PAGE = 20;

  const filtered = useMemo(() => records.filter(r => {
    if(filterPartner && r.taPartner !== filterPartner) return false;
    if(filterArea && r.workArea !== filterArea) return false;
    if(filterHired === 'hired' && !r.totalHired) return false;
    if(filterHired === 'pending' && r.totalHired) return false;
    if(search && !`${r.taPartner} ${r.workArea} ${r.hiredName} ${r.advanceStage}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }), [records, filterPartner, filterArea, filterHired, search]);

  const paged = filtered.slice(page * PER_PAGE, (page+1) * PER_PAGE);
  const pages = Math.ceil(filtered.length / PER_PAGE);

  return (
    <div>
      <div style={{ padding:'20px 24px 0', borderBottom:'1px solid #1e293b', paddingBottom:16, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700, color:'#f1f5f9' }}>All Records</div>
          <div style={{ fontSize:13, color:'#64748b', marginTop:3 }}>{filtered.length} of {records.length} records</div>
        </div>
        <button
          onClick={() => downloadExcel(records)}
          style={{ display:'flex', alignItems:'center', gap:8, background:'#16a34a', color:'#fff', border:'none', borderRadius:8, padding:'9px 18px', fontSize:13, fontWeight:700, cursor:'pointer', boxShadow:'0 0 12px rgba(22,163,74,0.3)' }}
        >
          ⬇ Download Excel
        </button>
      </div>
      <div style={{ padding:24 }}>
        <div style={{ display:'flex', gap:10, marginBottom:16, flexWrap:'wrap' }}>
          <input style={{ ...S.input, width:200 }} placeholder="Search..." value={search} onChange={e => { setSearch(e.target.value); setPage(0); }} />
          <select style={{ ...S.input, width:160 }} value={filterPartner} onChange={e => { setFilterPartner(e.target.value); setPage(0); }}>
            <option value="">All TA Partners</option>
            {taPartners.map(p => <option key={p}>{p}</option>)}
          </select>
          <select style={{ ...S.input, width:160 }} value={filterArea} onChange={e => { setFilterArea(e.target.value); setPage(0); }}>
            <option value="">All Work Areas</option>
            {workAreas.map(a => <option key={a}>{a}</option>)}
          </select>
          <select style={{ ...S.input, width:140 }} value={filterHired} onChange={e => { setFilterHired(e.target.value); setPage(0); }}>
            <option value="">All Status</option>
            <option value="hired">Hired</option>
            <option value="pending">Pending</option>
          </select>
        </div>

        <div style={{ overflowX:'auto' }}>
          <table style={S.table}>
            <thead>
              <tr>
                {['TA Partner','Work Area','Target','Hired','Yet To Hire','Offer Accepted','Advance Stage','Declined','WIP','Hired Candidate','Offer Acc. Cand.','Actions'].map(h => <th key={h} style={S.th}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {paged.map(r => (
                <tr key={r.id}>
                  <td style={{ ...S.td, fontWeight:600, color:'#e2e8f0', whiteSpace:'nowrap' }}>{r.taPartner}</td>
                  <td style={{ ...S.td, whiteSpace:'nowrap' }}>{r.workArea}</td>
                  <td style={{ ...S.td, textAlign:'center' }}>{r.targetClosure}</td>
                  <td style={{ ...S.td, textAlign:'center', color:'#22c55e', fontWeight:600 }}>{r.totalHired}</td>
                  <td style={{ ...S.td, textAlign:'center', color:'#f59e0b' }}>{calcYTH(r)}</td>
                  <td style={{ ...S.td, textAlign:'center', color:'#14b8a6' }}>{r.totalOffersAccepted}</td>
                  <td style={{ ...S.td, maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color: r.advanceStage ? '#f59e0b' : '#334155' }}>{r.advanceStage || '—'}</td>
                  <td style={{ ...S.td, textAlign:'center', color:'#ef4444' }}>{r.totalDeclined}</td>
                  <td style={{ ...S.td, textAlign:'center', color:'#8b5cf6' }}>{r.totalOffersWIP}</td>
                  <td style={{ ...S.td, maxWidth:100, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:11 }}>{r.hiredName || '—'}{r.hiredDOJ ? <span style={{ color:'#475569', marginLeft:4 }}>({r.hiredDOJ})</span> : ''}</td>
                  <td style={{ ...S.td, maxWidth:100, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:11 }}>{r.offerAcceptedName || '—'}{r.offerAcceptedDOJ ? <span style={{ color:'#475569', marginLeft:4 }}>({r.offerAcceptedDOJ})</span> : ''}</td>
                  <td style={S.td}>
                    <div style={{ display:'flex', gap:4 }}>
                      <button style={S.btn('secondary')} onClick={() => onEdit(r)}>Edit</button>
                      <button style={S.btn('danger')} onClick={() => { if(confirm('Delete this record?')) onDelete(r.id); }}>Del</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {pages > 1 && (
          <div style={{ display:'flex', gap:6, justifyContent:'center', marginTop:16 }}>
            <button style={S.btn('secondary')} disabled={page===0} onClick={() => setPage(p=>p-1)}>‹ Prev</button>
            <span style={{ padding:'6px 12px', fontSize:12, color:'#64748b' }}>Page {page+1} of {pages}</span>
            <button style={S.btn('secondary')} disabled={page===pages-1} onClick={() => setPage(p=>p+1)}>Next ›</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADVANCED ANALYTICS ───────────────────────────────────────────────────────
function AdvancedAnalytics({ records }) {
  const funnelData = useMemo(() => {
    const target = records.reduce((s,r) => s + (r.targetClosure||0), 0);
    const advance = records.filter(r => r.advanceStage).length;
    const offerAcc = records.reduce((s,r) => s + (r.totalOffersAccepted||0), 0);
    const hired = records.reduce((s,r) => s + (r.totalHired||0), 0);
    return [
      { name:'Target Positions', value:target },
      { name:'In Advance Stage', value:advance },
      { name:'Offers Accepted', value:offerAcc },
      { name:'Hired', value:hired },
    ];
  }, [records]);

  const byPartnerAdv = useMemo(() => {
    const map = {};
    records.forEach(r => {
      if(!r.taPartner) return;
      if(!map[r.taPartner]) map[r.taPartner] = { name:r.taPartner, target:0, hired:0, offersAccepted:0, declined:0, wip:0 };
      map[r.taPartner].target += r.targetClosure||0;
      map[r.taPartner].hired += r.totalHired||0;
      map[r.taPartner].offersAccepted += r.totalOffersAccepted||0;
      map[r.taPartner].declined += r.totalDeclined||0;
      map[r.taPartner].wip += r.totalOffersWIP||0;
    });
    return Object.values(map).sort((a,b) => b.hired - a.hired);
  }, [records]);

  const dojMonths = useMemo(() => {
    const map = {};
    const addDOJ = (doj, type) => {
      if(!doj) return;
      const m = doj.substring(0,7);
      if(!map[m]) map[m] = { month:m, hired:0, offered:0, declined:0 };
      map[m][type]++;
    };
    records.forEach(r => {
      addDOJ(r.hiredDOJ, 'hired');
      addDOJ(r.offerAcceptedDOJ, 'offered');
      addDOJ(r.declinedDOJ, 'declined');
    });
    return Object.values(map).sort((a,b) => a.month.localeCompare(b.month));
  }, [records]);

  const weeklyProgress = useMemo(() => {
    const map = {};
    records.forEach(r => r.weeklyCommits?.forEach(wc => {
      if(!wc.week) return;
      if(!map[wc.week]) map[wc.week] = { week:wc.week, yes:0, no:0, total:0 };
      map[wc.week].total++;
      if(wc.progressMet===true) map[wc.week].yes++;
      else if(wc.progressMet===false) map[wc.week].no++;
    }));
    return Object.values(map).sort((a,b) => a.week.localeCompare(b.week)).map(d => ({
      ...d, rate: d.total > 0 ? Math.round(d.yes / (d.yes + d.no) * 100) : 0
    }));
  }, [records]);

  const workAreaHireRates = useMemo(() => {
    const map = {};
    records.forEach(r => {
      if(!r.workArea) return;
      if(!map[r.workArea]) map[r.workArea] = { name:r.workArea, target:0, hired:0 };
      map[r.workArea].target += r.targetClosure||0;
      map[r.workArea].hired += r.totalHired||0;
    });
    return Object.values(map).filter(d => d.target > 0).map(d => ({ ...d, rate: Math.round(d.hired/d.target*100) })).sort((a,b) => b.rate - a.rate).slice(0,12);
  }, [records]);

  return (
    <div>
      <div style={{ padding:'20px 24px 0', borderBottom:'1px solid #1e293b', paddingBottom:16 }}>
        <div style={{ fontSize:20, fontWeight:700, color:'#f1f5f9' }}>Advanced Analytics</div>
        <div style={{ fontSize:13, color:'#64748b', marginTop:3 }}>Deep dive into recruitment metrics & trends</div>
      </div>
      <div style={{ padding:24 }}>
        <div style={S.grid(2)}>
          {/* Hiring Funnel */}
          <div style={S.card}>
            <div style={S.sectionTitle}>Hiring Funnel</div>
            <div style={{ padding:'8px 0' }}>
              {funnelData.map((d, i) => {
                const pct = funnelData[0].value > 0 ? d.value / funnelData[0].value : 0;
                const colors = ['#6366f1','#f59e0b','#14b8a6','#22c55e'];
                return (
                  <div key={d.name} style={{ marginBottom:12 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                      <span style={{ fontSize:12, color:'#94a3b8' }}>{d.name}</span>
                      <span style={{ fontSize:13, fontWeight:700, color:colors[i] }}>{d.value} <span style={{ fontSize:10, color:'#475569' }}>({(pct*100).toFixed(0)}%)</span></span>
                    </div>
                    <div style={{ background:'#1e293b', borderRadius:4, height:8 }}>
                      <div style={{ background:colors[i], width:`${pct*100}%`, height:8, borderRadius:4, transition:'width 0.5s' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Weekly Progress Rate */}
          <div style={S.card}>
            <div style={S.sectionTitle}>Weekly Commit Progress Rate (%)</div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={weeklyProgress} margin={{ top:0, right:10, left:-20, bottom:20 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                <XAxis dataKey="week" tick={{ fill:'#64748b', fontSize:9 }} angle={-20} textAnchor="end" />
                <YAxis tick={{ fill:'#64748b', fontSize:10 }} domain={[0,100]} />
                <Tooltip contentStyle={{ background:'#0f172a', border:'1px solid #1e293b', fontSize:12 }} formatter={(v) => [`${v}%`,'Rate']} />
                <Bar dataKey="rate" name="Progress Rate %" fill="#14b8a6" radius={[3,3,0,0]}>
                  {weeklyProgress.map((d,i) => <Cell key={i} fill={d.rate >= 70 ? '#22c55e' : d.rate >= 40 ? '#f59e0b' : '#ef4444'} />)}
                </Bar>
              </BarChart>

// ─── TA PARTNER DASHBOARD (personal view) ────────────────────────────────────
function TAPartnerDashboard({ partnerName, records }) {
  const [taTab, setTaTab] = useState('overview');
  const [taDrill, setTaDrill] = useState(null);
  const myRecords = records.filter(r => r.taPartner === partnerName);
  const totals = {
    target: myRecords.reduce((s,r) => s+(r.targetClosure||0),0),
    hired:  myRecords.reduce((s,r) => s+(r.totalHired||0),0),
    yth:    myRecords.reduce((s,r) => s+calcYTH(r),0),
    offerAcc: myRecords.reduce((s,r) => s+(r.totalOffersAccepted||0),0),
    declined: myRecords.reduce((s,r) => s+(r.totalDeclined||0),0),
    wip:    myRecords.reduce((s,r) => s+(r.totalOffersWIP||0),0),
  };

  const byArea = useMemo(() => {
    const map = {};
    myRecords.forEach(r => {
      if(!r.workArea) return;
      if(!map[r.workArea]) map[r.workArea] = { name:r.workArea, target:0, hired:0, yth:0 };
      map[r.workArea].target += r.targetClosure||0;
      map[r.workArea].hired  += r.totalHired||0;
      map[r.workArea].yth    += calcYTH(r);
    });
    return Object.values(map).sort((a,b)=>b.target-a.target);
  }, [myRecords]);

  const kpis = [
    { label:'Target Closures', value:totals.target,    color:'#6366f1', drillKey:'target' },
    { label:'Hired',           value:totals.hired,     color:'#22c55e', drillKey:'hired' },
    { label:'Yet To Hire',     value:totals.yth,       color:'#f59e0b', drillKey:'yetToHire' },
    { label:'Offers Accepted', value:totals.offerAcc,  color:'#14b8a6', drillKey:'offered' },
    { label:'Declined',        value:totals.declined,  color:'#ef4444', drillKey:'declined' },
    { label:'Offers WIP',      value:totals.wip,       color:'#8b5cf6', drillKey:'wip' },
  ];

  return (
    <div>
      {taDrill && <KpiDrilldown type={taDrill} records={myRecords} onClose={() => setTaDrill(null)} />}
      <div style={{ padding:'16px 24px 0', borderBottom:'1px solid #1e293b', paddingBottom:0, marginBottom:0 }}>
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:18, fontWeight:700, color:'#f1f5f9' }}>My Dashboard — <span style={{ color:'#14b8a6' }}>{partnerName}</span></div>
          <div style={{ fontSize:13, color:'#64748b', marginTop:2 }}>{myRecords.length} record{myRecords.length!==1?'s':''}</div>
        </div>
        <div style={{ display:'flex', gap:0 }}>
          {[{id:'overview',label:'📊 Overview'},{id:'offered',label:'✅ Offer Accepted'},{id:'hired',label:'🎯 Hired'},{id:'declined',label:'❌ Declined'}].map(t => (
            <div key={t.id} onClick={() => setTaTab(t.id)}
              style={{ padding:'8px 14px', cursor:'pointer', fontSize:12, fontWeight: taTab===t.id ? 700 : 400,
                color: taTab===t.id ? '#14b8a6' : '#64748b',
                borderBottom: taTab===t.id ? '2px solid #14b8a6' : '2px solid transparent' }}>
              {t.label}
            </div>
          ))}
        </div>
      </div>
    <div style={{ padding:24 }}>
      {taTab==='offered' && <MonthwiseJoiners records={myRecords} type="offered" title="Offer Accepted Joiners" color="#22c55e" />}
      {taTab==='hired' && <MonthwiseJoiners records={myRecords} type="hired" title="Hired Joiners" color="#14b8a6" />}
      {taTab==='declined' && <MonthwiseJoiners records={myRecords} type="declined" title="Offer Declined" color="#ef4444" />}
      {taTab==='overview' && <>
      <div style={{ ...S.grid(3), marginBottom:20 }}>
        {kpis.map(k => (
          <div key={k.label}
            onClick={() => setTaDrill(k.drillKey)}
            style={{ ...S.kpiCard(k.color), cursor:'pointer', transition:'all 0.15s', position:'relative', overflow:'hidden' }}
            onMouseEnter={e => { e.currentTarget.style.background='#1e293b'; e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow=`0 8px 24px ${k.color}25`; }}
            onMouseLeave={e => { e.currentTarget.style.background='#0f172a'; e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}
          >
            <div style={S.kpiLabel}>{k.label}</div>
            <div style={{ ...S.kpiVal, color:k.color, fontSize:24 }}>{k.value}</div>
            <div style={{ position:'absolute', top:8, right:8, fontSize:10, color:`${k.color}80`, fontWeight:700 }}>VIEW ↗</div>
          </div>
        ))}
      </div>
      {byArea.length > 0 && (
        <div style={S.card}>
          <div style={S.sectionTitle}>Work Area Breakdown</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={byArea} margin={{ top:0, right:10, left:-20, bottom:40 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
              <XAxis dataKey="name" tick={{ fill:'#64748b', fontSize:10 }} angle={-35} textAnchor="end" interval={0} />
              <YAxis tick={{ fill:'#64748b', fontSize:10 }} />
              <Tooltip contentStyle={{ background:'#0f172a', border:'1px solid #1e293b', fontSize:12 }} />
              <Legend wrapperStyle={{ fontSize:11 }} />
              <Bar dataKey="target" name="Target" fill="#6366f1" radius={[3,3,0,0]} />
              <Bar dataKey="hired"  name="Hired"  fill="#22c55e" radius={[3,3,0,0]} />
              <Bar dataKey="yth"    name="Yet To Hire" fill="#f59e0b" radius={[3,3,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      )}
      <div style={{ ...S.card, marginTop:20 }}>
        <div style={S.sectionTitle}>My Records</div>
        <div style={{ overflowX:'auto' }}>
          <table style={S.table}>
            <thead>
              <tr>{['Work Area','Target','Hired','Yet To Hire','Offer Acc.','Declined','Advance Stage'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {myRecords.map(r => (
                <tr key={r.id}>
                  <td style={{ ...S.td, fontWeight:600 }}>{r.workArea}</td>
                  <td style={S.td}>{r.targetClosure}</td>
                  <td style={{ ...S.td, color:'#22c55e', fontWeight:600 }}>{r.totalHired}</td>
                  <td style={{ ...S.td, color:'#f59e0b' }}>{calcYTH(r)}</td>
                  <td style={{ ...S.td, color:'#14b8a6' }}>{r.totalOffersAccepted}</td>
                  <td style={{ ...S.td, color:'#ef4444' }}>{r.totalDeclined}</td>
                  <td style={{ ...S.td, fontSize:11, color:'#f59e0b', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.advanceStage||'—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      </>}
    </div>
    </div>
  );
}

// ─── MANAGER PASSWORD SCREEN ──────────────────────────────────────────────────
function ManagerLogin({ onSuccess, onBack }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState(false);
  const [shake, setShake] = useState(false);
  const attempt = () => {
    if(pw === '2334') { onSuccess(); }
    else { setErr(true); setPw(''); setShake(true); setTimeout(() => setShake(false), 500); }
  };
  return (
    <div style={{ minHeight:'100vh', background:'#0a0f1e', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'DM Sans',system-ui,sans-serif" }}>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}`}</style>
      <div style={{ background:'#0f172a', border: err?'1px solid #ef4444':'1px solid #1e293b', borderRadius:16, padding:40, width:380, maxWidth:'95vw', boxShadow:'0 24px 60px rgba(0,0,0,0.5)', animation: shake?'shake 0.4s ease':'none' }}>
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <img src={LOGO_SRC} alt="Netcracker" style={{ width:80, marginBottom:16 }} />
          <div style={{ fontSize:18, fontWeight:800, color:'#f1f5f9', marginBottom:4 }}>Manager Access</div>
          <div style={{ fontSize:13, color:'#64748b' }}>Enter password to continue</div>
        </div>
        <label style={{ ...S.label, marginBottom:6 }}>Password</label>
        <input style={{ ...S.input, fontSize:16, padding:'11px 14px', marginBottom:8, letterSpacing:'0.2em', borderColor: err?'#ef4444':'#334155' }}
          type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>{if(e.key==='Enter')attempt();}} placeholder="••••" autoFocus />
        {err && <div style={{ color:'#ef4444', fontSize:12, marginBottom:8, textAlign:'center' }}>Incorrect password. Please try again.</div>}
        <button onClick={attempt}
          style={{ width:'100%', padding:'12px', fontSize:15, fontWeight:800, borderRadius:8, border:'none', background:'#6366f1', color:'#fff', cursor:'pointer', boxShadow:'0 0 20px rgba(99,102,241,0.4)', marginTop:4 }}>
          Unlock →
        </button>
        <div style={{ marginTop:16, textAlign:'center' }}>
          <span style={{ fontSize:12, color:'#334155', cursor:'pointer', textDecoration:'underline' }} onClick={onBack}>← Back to Home</span>
        </div>
      </div>
    </div>
  );
}

  const [records, setRecords]       = useState(SEED_DATA);
  const [taPartners, setTaPartners] = useState(INITIAL_PARTNERS);
  const [workAreas, setWorkAreas]   = useState(INITIAL_WORK_AREAS);
  const [view, setView]             = useState('dashboard');
  const [editRecord, setEditRecord] = useState(null);
  const [showForm, setShowForm]     = useState(false);
  const [loaded, setLoaded]         = useState(false);
  const [mode, setMode]             = useState('landing');
  const [managerAuth, setManagerAuth] = useState(false); // 'landing' | 'manager' | 'ta'

  useEffect(() => {
    async function load() {
      try {
        const r = await window.storage.get('recruitment_data');
        if(r) {
          const d = JSON.parse(r.value);
          if(d.records?.length)    setRecords(d.records);
          if(d.taPartners?.length) setTaPartners(d.taPartners);
          if(d.workAreas?.length)  setWorkAreas(d.workAreas);
        }
      } catch(e) {}
      setLoaded(true);
    }
    load();
  }, []);

  useEffect(() => {
    if(!loaded) return;
    window.storage.set('recruitment_data', JSON.stringify({ records, taPartners, workAreas })).catch(()=>{});
  }, [records, taPartners, workAreas, loaded]);

  const handleSave = (rec, newPartners, newAreas) => {
    if(newPartners?.length) setTaPartners(newPartners);
    if(newAreas?.length)    setWorkAreas(newAreas);
    if(editRecord) {
      setRecords(rs => rs.map(r => r.id === rec.id ? rec : r));
    } else {
      setRecords(rs => [...rs, { ...rec, id: Date.now(), createdAt: rec.createdAt || TODAY }]);
    }
    setShowForm(false);
    setEditRecord(null);
  };

  const handleUpdateLists = ({ taPartners: np, workAreas: na } = {}) => {
    if(np?.length) setTaPartners(np);
    if(na?.length) setWorkAreas(na);
  };

  const handleEdit   = (rec) => { setEditRecord(rec); setShowForm(true); };
  const handleDelete = (id)  => setRecords(rs => rs.filter(r => r.id !== id));

  const navItems = [
    { id:'dashboard', icon:'⊞', label:'Dashboard' },
    { id:'records',   icon:'☰', label:'All Records' },
    { id:'analytics', icon:'◈', label:'Analytics' },
  ];

  if(mode === 'manager' && !managerAuth) {
    return <ManagerLogin onSuccess={() => setManagerAuth(true)} onBack={() => setMode('landing')} />;
  }

  // ── LANDING ────────────────────────────────────────────────────────────────
  if(mode === 'landing') {
    return (
      <div style={{ minHeight:'100vh', background:'#0a0f1e', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:"'DM Sans', system-ui, sans-serif", position:'relative', overflow:'hidden' }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap'); *{box-sizing:border-box;}`}</style>
        <div style={{ position:'absolute', top:'-10%', right:'-5%', width:500, height:500, borderRadius:'50%', background:'radial-gradient(circle, rgba(74,127,165,0.1) 0%, transparent 70%)', pointerEvents:'none' }} />
        <div style={{ position:'absolute', bottom:'-10%', left:'-5%', width:450, height:450, borderRadius:'50%', background:'radial-gradient(circle, rgba(44,74,110,0.08) 0%, transparent 70%)', pointerEvents:'none' }} />

        <div style={{ textAlign:'center', marginBottom:52, position:'relative' }}>
          {/* Full Netcracker brand logo */}
          <div style={{ marginBottom:28, position:'relative' }}>
            <img src={LOGO_FULL_SRC} alt="Netcracker" style={{ width:260, filter:'brightness(1.1) drop-shadow(0 4px 20px rgba(60,100,160,0.35))' }} />
          </div>
          {/* Recruit subtitle styled like brand banner */}
          <div style={{ position:'relative', marginBottom:6 }}>
            <div style={{ background:'linear-gradient(90deg,#4a7fa5 0%,#5b9cc4 60%,#3d6b8a 100%)', borderRadius:3, padding:'5px 20px', display:'inline-block' }}>
              <span style={{ fontSize:13, fontStyle:'italic', fontWeight:600, color:'#fff', letterSpacing:'0.04em' }}>Your Talent Acquisition Hub</span>
            </div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
            <div style={{ fontSize:30, fontWeight:800, color:'#f1f5f9', letterSpacing:'-0.01em', lineHeight:1.2, fontFamily:"'DM Sans',sans-serif" }}>
              <span style={{ color:'#f1f5f9' }}>Netcracker </span><span style={{ color:'#5b9cc4' }}>Recruit</span>
            </div>

          </div>
        </div>

        <div style={{ display:'flex', gap:24, flexWrap:'wrap', justifyContent:'center', position:'relative' }}>
          {/* Manager Card */}
          <div
            onClick={() => setMode('manager')}
            style={{ width:300, background:'#0f172a', border:'1px solid #1e293b', borderRadius:16, padding:32, cursor:'pointer', transition:'all 0.2s', boxShadow:'0 4px 20px rgba(0,0,0,0.3)' }}
            onMouseEnter={e => { e.currentTarget.style.border='1px solid rgba(74,127,165,0.7)'; e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow='0 12px 40px rgba(74,127,165,0.2)'; }}
            onMouseLeave={e => { e.currentTarget.style.border='1px solid #1e293b'; e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.3)'; }}
          >
            <div style={{ width:52, height:52, borderRadius:12, background:'rgba(74,127,165,0.15)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, marginBottom:18 }}>⊞</div>
            <div style={{ fontSize:19, fontWeight:700, color:'#f1f5f9', marginBottom:8 }}>Manager View</div>
            <div style={{ fontSize:13, color:'#64748b', lineHeight:1.65, marginBottom:20 }}>Full admin access — Dashboard, all records, analytics, add / edit / delete any data.</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, color:'#4a7fa5', fontWeight:700 }}>
              Enter as Manager <span style={{ fontSize:16 }}>→</span>
            </div>
          </div>

          {/* TA Partner Card */}
          <div
            onClick={() => setMode('ta')}
            style={{ width:300, background:'#0f172a', border:'1px solid #1e293b', borderRadius:16, padding:32, cursor:'pointer', transition:'all 0.2s', boxShadow:'0 4px 20px rgba(0,0,0,0.3)' }}
            onMouseEnter={e => { e.currentTarget.style.border='1px solid rgba(20,184,166,0.6)'; e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow='0 12px 40px rgba(20,184,166,0.15)'; }}
            onMouseLeave={e => { e.currentTarget.style.border='1px solid #1e293b'; e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.3)'; }}
          >
            <div style={{ width:52, height:52, borderRadius:12, background:'rgba(20,184,166,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, marginBottom:18 }}>👤</div>
            <div style={{ fontSize:19, fontWeight:700, color:'#f1f5f9', marginBottom:8 }}>TA Partner View</div>
            <div style={{ fontSize:13, color:'#64748b', lineHeight:1.65, marginBottom:20 }}>Add weekly updates, view your personal dashboard. Edit / delete only today's records.</div>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, color:'#14b8a6', fontWeight:700 }}>
              Enter as TA Partner <span style={{ fontSize:16 }}>→</span>
            </div>
          </div>
        </div>

        <div style={{ marginTop:40, fontSize:12, color:'#334155', position:'relative' }}>
          {records.length} records · {records.reduce((s,r)=>s+(r.totalHired||0),0)} hired · {records.reduce((s,r)=>s+(r.targetClosure||0),0)} targets
        </div>
      </div>
    );
  }

  // ── TA PARTNER MODE ────────────────────────────────────────────────────────
  if(mode === 'ta') {
    return (
      <TAPartnerPortal
        taPartners={taPartners}
        workAreas={workAreas}
        records={records}
        onSave={(rec, np, na) => {
          if(np?.length) setTaPartners(np);
          if(na?.length) setWorkAreas(na);
          setRecords(rs => [...rs, { ...rec, id: Date.now(), createdAt: TODAY }]);
        }}
        onEdit={(rec) => setRecords(rs => rs.map(r => r.id === rec.id ? rec : r))}
        onDelete={handleDelete}
        onUpdateLists={handleUpdateLists}
        onBack={() => setMode('landing')}
      />
    );
  }

  // ── MANAGER MODE ───────────────────────────────────────────────────────────
  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0f1e; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        select option { background: #0f172a; }
      `}</style>

      {/* Sidebar */}
      <div style={S.sidebar}>
        <div style={S.sideHeader}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:2 }}>
            <img src={LOGO_SRC} alt="NC" style={{ width:26, filter:'brightness(0.85)' }} />
            <div style={S.sideTitle}>Netcracker</div>
          </div>
          <div style={S.sideSubtitle}>Manager View</div>
        </div>
        <div style={S.sideNav}>
          {navItems.map(n => (
            <div key={n.id} style={S.sideItem(view===n.id && !showForm)} onClick={() => { setView(n.id); setShowForm(false); setEditRecord(null); }}>
              <span style={{ fontSize:15 }}>{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
          <div style={{ marginTop:16, borderTop:'1px solid #1e293b', paddingTop:12 }}>
            <div style={S.sideItem(showForm && !editRecord)} onClick={() => { setEditRecord(null); setShowForm(true); setView('entry'); }}>
              <span style={{ fontSize:15 }}>＋</span>
              <span>Add Record</span>
            </div>
          </div>
        </div>
        <div style={{ padding:'12px 16px', borderTop:'1px solid #1e293b' }}>
          <div style={{ fontSize:11, color:'#334155' }}>{records.length} records total</div>
          <div style={{ fontSize:11, color:'#334155', marginTop:2 }}>{records.reduce((s,r)=>s+(r.totalHired||0),0)} hired / {records.reduce((s,r)=>s+(r.targetClosure||0),0)} targets</div>
          <div style={{ marginTop:10, fontSize:11, color:'#475569', cursor:'pointer' }} onClick={() => { setMode('landing'); setManagerAuth(false); }}>⇦ Switch View</div>
        </div>
      </div>

      {/* Main Content */}
      <div style={S.main}>
        {showForm ? (
          <div>
            <div style={{ padding:'20px 24px 0', borderBottom:'1px solid #1e293b', paddingBottom:16, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <div style={{ fontSize:20, fontWeight:700, color:'#f1f5f9' }}>{editRecord ? 'Edit Record' : 'Add New Record'}</div>
                <div style={{ fontSize:13, color:'#64748b', marginTop:3 }}>Fill in all applicable fields</div>
              </div>
              <button style={{ ...S.btn('secondary'), padding:'8px 18px', fontSize:13 }} onClick={() => { setShowForm(false); setEditRecord(null); }}>← Back</button>
            </div>
            <div style={{ padding:24 }}>
              <RecordForm
                record={editRecord}
                taPartners={taPartners}
                workAreas={workAreas}
                onSave={handleSave}
                onCancel={() => { setShowForm(false); setEditRecord(null); }}
                onUpdateLists={handleUpdateLists}
              />
            </div>
          </div>
        ) : view === 'dashboard' ? (
          <Dashboard records={records} />
        ) : view === 'records' ? (
          <RecordsView records={records} taPartners={taPartners} workAreas={workAreas} onEdit={handleEdit} onDelete={handleDelete} />
        ) : view === 'analytics' ? (
          <AdvancedAnalytics records={records} />
        ) : null}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

  </script>

  <script>
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var el = document.getElementById('loading');
        if(el) el.style.display = 'none';
      }, 800);
    });
  </script>
</body>
</html>
